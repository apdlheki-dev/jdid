<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLUE SPORT</title>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .video-box { background: #111; padding: 10px; border-radius: 20px; border: 2px solid #a855f7; margin-bottom: 20px; }
        iframe { width: 100%; height: 450px; border-radius: 15px; border: none; }
        button { padding: 15px 30px; margin: 5px; border-radius: 30px; border: none; background: #a855f7; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>BLUE SPORT TV</h1>
        <div class="video-box">
            <!-- هنا يظهر البث -->
            <iframe id="videoPlayer" src="https://bluesport.fun/" allowfullscreen></iframe>
        </div>

        <div id="channels">
            <button onclick="changeChannel('https://bluesport.fun/')">beIN SP 1</button>
            <button onclick="changeChannel('https://example.com/other-channel')">قناة أخرى</button>
        </div>
    </div>

    <script>
        function changeChannel(url) {
            document.getElementById('videoPlayer').src = url;
        }
    </script>
</body>
</html>
