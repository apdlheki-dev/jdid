<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة شبكتي - البث المباشر</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .player-area { flex: 1; width: 100%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .nav { background: #111; padding: 15px; display: flex; justify-content: space-around; }
        .btn { padding: 10px 20px; background: #a855f7; border-radius: 10px; cursor: pointer; color: white; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <!-- منطقة البث -->
        <div class="player-area">
            <iframe id="main-frame" src="https://bluesport.fun/" allow="autoplay; fullscreen"></iframe>
        </div>

        <!-- أزرار القنوات -->
        <div class="nav">
            <button class="btn" onclick="changeChannel('https://bluesport.fun/channel1')">BeIN 1</button>
            <button class="btn" onclick="changeChannel('https://bluesport.fun/channel2')">BeIN 2</button>
            <button class="btn" onclick="changeChannel('https://bluesport.fun/channel3')">BeIN 3</button>
        </div>
    </div>

    <script>
        function changeChannel(url) {
            document.getElementById('main-frame').src = url;
        }
    </script>
</body>
</html>
